<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAMPUSXCHANGE</title>
    <script>
      (function () {
        var fallbackBase = "/Campus-Marketplace/";
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;

        if (!window.location.pathname.startsWith(fallbackBase)) {
          fallbackBase = "/";
        }

        try {
          window.sessionStorage.setItem("campusxchange:static-host-redirect", redirectPath);
        } catch (error) {
          window.location.replace(fallbackBase);
          return;
        }

        window.location.replace(fallbackBase);
      })();
    </script>
  </head>
  <body>
    <main>
      <p>Redirecting to CAMPUSXCHANGE...</p>
    </main>
  </body>
</html>
